
server {
    listen 80;
    server_name xhk-zj.kuaihuoyun.com;

    # Frontend (Main)
    location / {
        root /data/trackcard-platform/trackcard-frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin Frontend (Assuming admin subdomain or subpath, but user only gave one domain. 
    # Usually admin is separate. For now, let's assume /admin path or port 5181 mapped elsewhere.
    # User's request was general "deploy this code". Let's serve main on root.)
    
    # Backend API Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
